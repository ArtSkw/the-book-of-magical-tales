<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Book of Magical Tales / Księga Magicznych Opowieści</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=EB+Garamond:ital,wght@0,500;0,600;1,500&family=MedievalSharp&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="storybook-shell is-entering is-book-closed" aria-label="The Book of Magical Tales / Księga Magicznych Opowieści">
      <section class="table-scene">
        <div class="ambient-shadow"></div>
        <div class="candle-wrap">
          <button class="candle" id="candleButton" type="button" aria-label="Brighten or dim the candle">
            <span class="flame"></span>
            <span class="wick"></span>
            <span class="wax"></span>
            <span class="pool"></span>
          </button>
        </div>
        <button class="book-cover-start" id="bookCoverStart" type="button" aria-label="Otwórz Księgę Magicznych Opowieści">
          <span class="cover-living-detail cover-warmth" aria-hidden="true"></span>
          <span class="cover-living-detail cover-glint glint-corner" aria-hidden="true"></span>
          <span class="cover-living-detail cover-glint glint-medallion" aria-hidden="true"></span>
          <span class="cover-living-detail cover-glint glint-clasp" aria-hidden="true"></span>
          <span class="cover-living-detail cover-glint glint-spine" aria-hidden="true"></span>
          <span class="cover-living-detail cover-glint glint-lower" aria-hidden="true"></span>
          <span class="cover-living-detail cover-reflection reflection-medallion" aria-hidden="true"></span>
          <span class="cover-living-detail cover-reflection reflection-clasp" aria-hidden="true"></span>
          <span class="cover-living-detail cover-dust dust-one" aria-hidden="true"></span>
          <span class="cover-living-detail cover-dust dust-two" aria-hidden="true"></span>
          <span class="cover-living-detail cover-dust dust-three" aria-hidden="true"></span>
          <span class="cover-living-detail cover-dust dust-four" aria-hidden="true"></span>
          <span class="cover-living-detail cover-dust dust-five" aria-hidden="true"></span>
          <span class="cover-living-detail cover-dust dust-six" aria-hidden="true"></span>
          <span class="cover-living-detail cover-dust dust-seven" aria-hidden="true"></span>
          <span class="cover-living-detail cover-dust dust-eight" aria-hidden="true"></span>
        </button>
        <div class="book" aria-live="polite">
          <div class="language-switch" id="languageSwitch" aria-label="Choose language">
            <button class="language-option is-active" type="button" data-language="en">EN</button>
            <button class="language-option" type="button" data-language="pl">PL</button>
          </div>
          <button class="sound-toggle" id="soundToggle" type="button" aria-pressed="false">
            <span>Sound</span>
          </button>
          <nav class="story-tabs" id="storyTabs" aria-label="Choose a tale"></nav>

          <section class="page left-page">
            <div class="page-inner">
              <div class="page-border">
                <div class="page-kicker" id="storyKicker"></div>
                <h1 id="storyTitle"></h1>
                <div class="illustration-frame" id="illustrationFrame" role="button" tabindex="0" aria-label="Wake the manuscript illustration"></div>
              </div>
            </div>
          </section>

          <section class="page right-page">
            <div class="page-inner">
              <div class="page-border text-page">
                <div class="page-count" id="pageCount"></div>
                <div class="page-progress" id="pageProgress" aria-hidden="true"></div>
                <h2 id="pageTitle"></h2>
                <article class="story-text" id="storyText"></article>
                <div class="choice-panel" id="choicePanel" aria-label="Gentle choice"></div>
                <button class="curiosity-note-button" id="curiosityNoteButton" type="button" aria-expanded="false">
                  <span>Did you know...?</span>
                </button>
                <button class="restart-story" id="restartStory" type="button" hidden>Begin again</button>
                <aside class="curiosity-note-card" id="curiosityCard" hidden></aside>
              </div>
            </div>
          </section>

          <div class="spine" aria-hidden="true"></div>
          <div class="page-controls" aria-label="Page controls">
            <button class="nav-button" id="prevPage" type="button" aria-label="Previous page">‹</button>
            <button class="nav-button" id="nextPage" type="button" aria-label="Next page">›</button>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
